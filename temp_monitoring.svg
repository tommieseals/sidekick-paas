<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#00d2ff" font-family="Arial" font-size="22" font-weight="bold">Auto-Healing Monitoring System</text>
  
  <rect x="50" y="70" width="120" height="60" rx="8" fill="#2a2a4e" stroke="#00ff88" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="12" font-weight="bold">Health Check</text>
  <text x="110" y="115" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Every 60s</text>
  
  <line x1="170" y1="100" x2="210" y2="100" stroke="#00ff88" stroke-width="2"/>
  
  <rect x="210" y="70" width="100" height="60" rx="30" fill="#2a2a4e" stroke="#ffd93d" stroke-width="2"/>
  <text x="260" y="105" text-anchor="middle" fill="#ffd93d" font-family="Arial" font-size="12" font-weight="bold">OK?</text>
  
  <line x1="260" y1="130" x2="260" y2="170" stroke="#00ff88" stroke-width="2"/>
  <text x="245" y="155" fill="#00ff88" font-family="Arial" font-size="10">YES</text>
  
  <rect x="210" y="170" width="100" height="40" rx="8" fill="#2a2a4e" stroke="#00ff88" stroke-width="2"/>
  <text x="260" y="195" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Continue</text>
  
  <line x1="310" y1="100" x2="360" y2="100" stroke="#ff6b6b" stroke-width="2"/>
  <text x="335" y="90" fill="#ff6b6b" font-family="Arial" font-size="10">NO</text>
  
  <rect x="360" y="70" width="120" height="60" rx="8" fill="#2a2a4e" stroke="#ff6b6b" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" fill="#ff6b6b" font-family="Arial" font-size="12" font-weight="bold">Alert</text>
  <text x="420" y="115" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Telegram</text>
  
  <line x1="480" y1="100" x2="520" y2="100" stroke="#ff6b6b" stroke-width="2"/>
  
  <rect x="520" y="70" width="120" height="60" rx="8" fill="#2a2a4e" stroke="#ffd93d" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" fill="#ffd93d" font-family="Arial" font-size="12" font-weight="bold">Grace Period</text>
  <text x="580" y="115" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">10 minutes</text>
  
  <line x1="640" y1="100" x2="680" y2="100" stroke="#ffd93d" stroke-width="2"/>
  
  <rect x="680" y="70" width="100" height="60" rx="8" fill="#2a2a4e" stroke="#00d2ff" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" fill="#00d2ff" font-family="Arial" font-size="12" font-weight="bold">Restart</text>
  <text x="730" y="115" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Auto</text>
  
  <line x1="730" y1="130" x2="730" y2="170" stroke="#00d2ff" stroke-width="2"/>
  
  <rect x="680" y="170" width="100" height="60" rx="8" fill="#2a2a4e" stroke="#00ff88" stroke-width="2"/>
  <text x="730" y="195" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="12" font-weight="bold">Verify</text>
  <text x="730" y="215" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Check status</text>
  
  <line x1="730" y1="230" x2="730" y2="270" stroke="#00ff88" stroke-width="2"/>
  
  <rect x="680" y="270" width="100" height="60" rx="8" fill="#2a2a4e" stroke="#00ff88" stroke-width="2"/>
  <text x="730" y="295" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="12" font-weight="bold">Confirm</text>
  <text x="730" y="315" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Notify success</text>
  
  <rect x="50" y="280" width="300" height="100" rx="10" fill="#2a2a4e" stroke="#444" stroke-width="1"/>
  <text x="200" y="305" text-anchor="middle" fill="#888" font-family="Arial" font-size="12" font-weight="bold">Monitored Metrics</text>
  <text x="200" y="325" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">RAM &gt; 80% | Disk &gt; 80% | Load &gt; 4.0</text>
  <text x="200" y="345" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Service Down | SSH Unreachable</text>
  <text x="200" y="365" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Model Unloaded | API Errors</text>
  
  <rect x="380" y="280" width="280" height="100" rx="10" fill="#2a2a4e" stroke="#444" stroke-width="1"/>
  <text x="520" y="305" text-anchor="middle" fill="#888" font-family="Arial" font-size="12" font-weight="bold">Alert Channels</text>
  <text x="520" y="330" text-anchor="middle" fill="#00d2ff" font-family="Arial" font-size="11">Telegram Bot (instant)</text>
  <text x="520" y="350" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Daily Health Report (8 AM)</text>
  <text x="520" y="370" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Weekly Security Audit (Sunday)</text>
</svg>
