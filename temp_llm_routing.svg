  <line x1="480" y1="220" x2="650" y2="280" stroke="#00ff88" stroke-width="2"/>
  
  <rect x="70" y="290" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#ff6b6b" stroke-width="2"/>
