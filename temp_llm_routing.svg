  <text x="290" y="335" text-anchor="middle" fill="#888" font-family="Arial" font-size="10">Primary Node</text>
  <text x="290" y="355" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">185ms</text>
  
  <rect x="370" y="290" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#ffd93d" stroke-width="2"/>
