  <rect x="50" y="420" width="700" height="60" rx="8" fill="#2a2a4e" stroke="#444" stroke-width="1"/>
  <text x="400" y="445" text-anchor="middle" fill="#888" font-family="Arial" font-size="12">Routing: Code → Code Model | Simple → Fast | Images → Vision | Complex → Reasoning</text>
  <text x="400" y="465" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="11">Cost Optimization: Local-first routing saves $72/year</text>
