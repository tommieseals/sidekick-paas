  <text x="140" y="335" text-anchor="middle" fill="#888" font-family="Arial" font-size="10">Compute Node</text>
  <text x="140" y="355" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">~2s latency</text>
  
  <rect x="220" y="290" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#00ff88" stroke-width="2"/>
