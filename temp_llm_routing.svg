  <line x1="400" y1="120" x2="400" y2="160" stroke="#00ff88" stroke-width="2"/>
  
  <rect x="300" y="160" width="200" height="60" rx="10" fill="#2a2a4e" stroke="#00d2ff" stroke-width="2"/>
