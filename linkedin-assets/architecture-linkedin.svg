<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" style="background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="32" font-weight="700">Multi-Node AI Infrastructure</text>
  <text x="600" y="80" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="16" letter-spacing="3">INTELLIGENT ROUTING • SELF-HEALING • ZERO COST</text>
  
  <!-- Connection lines -->
  <g filter="url(#glow)">
    <!-- Gateway to all nodes -->
    <path d="M 600 200 Q 400 250 200 320" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
    <path d="M 600 200 L 600 320" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
    <path d="M 600 200 Q 800 250 1000 320" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
    
    <!-- Failover line -->
    <path d="M 200 450 Q 600 520 1000 450" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  </g>
  
  <!-- LLM Gateway (Center Top) -->
  <g transform="translate(500, 120)">
    <rect x="0" y="0" width="200" height="80" rx="15" fill="url(#nodeGrad)" stroke="#00d4ff" stroke-width="2" filter="url(#softGlow)"/>
    <text x="100" y="35" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">🧠 LLM GATEWAY</text>
    <text x="100" y="55" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">Smart Routing</text>
    <text x="100" y="70" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui, sans-serif" font-size="10">Auto-failover enabled</text>
  </g>
  
  <!-- Mac Mini Node -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="240" height="170" rx="15" fill="url(#nodeGrad)" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="40" rx="15" fill="rgba(16,185,129,0.2)"/>
    <text x="120" y="28" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="16" font-weight="700">🖥️ MAC MINI</text>
    <text x="120" y="65" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13">Orchestrator Node</text>
    <text x="120" y="90" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="11">16GB RAM • Apple Silicon</text>
    
    <line x1="20" y1="105" x2="220" y2="105" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <text x="30" y="125" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• phi3:mini (Fast)</text>
    <text x="30" y="142" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• nomic-embed-text</text>
    <text x="30" y="159" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• qwen2.5:3b</text>
  </g>
  
  <!-- Mac Pro Node -->
  <g transform="translate(480, 280)">
    <rect x="0" y="0" width="240" height="170" rx="15" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="40" rx="15" fill="rgba(139,92,246,0.2)"/>
    <text x="120" y="28" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="16" font-weight="700">⚡ MAC PRO</text>
    <text x="120" y="65" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13">Heavy Compute Node</text>
    <text x="120" y="90" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="11">High RAM • GPU Optimized</text>
    
    <line x1="20" y1="105" x2="220" y2="105" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <text x="30" y="125" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• deepseek-coder:6.7b</text>
    <text x="30" y="142" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• qwen2.5:7b (Reasoning)</text>
    <text x="30" y="159" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• llama2 (General)</text>
  </g>
  
  <!-- Cloud Node -->
  <g transform="translate(880, 280)">
    <rect x="0" y="0" width="240" height="170" rx="15" fill="url(#nodeGrad)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="40" rx="15" fill="rgba(245,158,11,0.2)"/>
    <text x="120" y="28" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="16" font-weight="700">☁️ CLOUD APIs</text>
    <text x="120" y="65" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13">Vision & Multimodal</text>
    <text x="120" y="90" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="11">NVIDIA API • 50 calls/day</text>
    
    <line x1="20" y1="105" x2="220" y2="105" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <text x="30" y="125" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• Kimi K2.5 (Vision)</text>
    <text x="30" y="142" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• Llama 90B (Analysis)</text>
    <text x="30" y="159" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="10">• Qwen Coder 32B</text>
  </g>
  
  <!-- Features bar -->
  <g transform="translate(0, 480)">
    <rect x="100" y="0" width="1000" height="60" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <g transform="translate(180, 30)">
      <circle cx="0" cy="0" r="8" fill="#10b981"/>
      <text x="20" y="5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14">Smart Routing</text>
    </g>
    
    <g transform="translate(380, 30)">
      <circle cx="0" cy="0" r="8" fill="#00d4ff"/>
      <text x="20" y="5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14">Auto-Failover</text>
    </g>
    
    <g transform="translate(580, 30)">
      <circle cx="0" cy="0" r="8" fill="#8b5cf6"/>
      <text x="20" y="5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14">Self-Healing</text>
    </g>
    
    <g transform="translate(780, 30)">
      <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
      <text x="20" y="5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14">Cost: $0/month</text>
    </g>
    
    <g transform="translate(980, 30)">
      <circle cx="0" cy="0" r="8" fill="#ef4444"/>
      <text x="20" y="5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14">99.9% Uptime</text>
    </g>
  </g>
  
  <!-- Routing labels -->
  <text x="350" y="260" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="10" transform="rotate(-15, 350, 260)">Fast queries</text>
  <text x="600" y="260" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="10">Code tasks</text>
  <text x="850" y="260" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="10" transform="rotate(15, 850, 260)">Vision/Analysis</text>
  
  <!-- Signature -->
  <text x="600" y="590" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="12">Built by Tommie Seals • github.com/tommieseals</text>
</svg>
