        function FlowingLine({ x1, y1, x2, y2, color = "#48BB78", delay = 0, curved = false, curveDir = "up" }) {
            const midX = (x1 + x2) / 2;
            const curveOffset = curveDir === "up" ? -40 : 40;
            const midY = curved ? (y1 + y2) / 2 + curveOffset : (y1 + y2) / 2;
            const pathD = curved 
                ? `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`
                : `M ${x1} ${y1} L ${x2} ${y2}`;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="4" fill={color}>
                        <animateMotion dur="2.5s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                    <circle cx={x1} cy={y1} r="3" fill={color} opacity="0.6" />
                    <circle cx={x2} cy={y2} r="3" fill={color} opacity="0.6" />
                </g>
            );
        }

        function ArchNode({ x, y, w, h, title, subtitle, icon, color, small = false }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 62 : 76;
            const iconSize = small ? 18 : 26;
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={6} rx={3} fill={color} />
                    <circle cx={x + w/2} cy={y + 28} r={small ? 16 : 22} fill={color + "20"} />
                    <text x={x + w/2} y={y + 33} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 10 : 12} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 8 : 9}>{subtitle}</text>}
                </g>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState("overview");
            
            const tabs = [
                { id: "overview", label: "📊 System Overview", component: TradingOverview },
                { id: "flow", label: "🔄 Strategy Flow", component: StrategyFlow },
                { id: "data", label: "📡 Data Sources", component: DataSources },
                { id: "alerts", label: "🚨 Alert System", component: AlertSystem }
            ];
            
            const ActiveDiagram = tabs.find(t => t.id === activeTab)?.component || TradingOverview;
            
            return (
                <div className="container">
                    <div className="section-tabs">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={"tab-btn " + (activeTab === tab.id ? "active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="diagram-card">
                        <div className="diagram-title">
