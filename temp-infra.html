<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure - Clawd Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .nav-brand h1 { font-size: 1.8rem; }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .section-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.2); }
        .tab-btn.active {
            background: linear-gradient(135deg, #1a365d, #2c5282);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .diagram-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .diagram-title {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .diagram-title h2 {
            color: #1a365d;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .diagram-title p {
            color: #718096;
            font-size: 1rem;
        }
        .diagram-svg {
            width: 100%;
            overflow-x: auto;
        }
        @media (max-width: 768px) {
            .nav-bar { flex-wrap: wrap; gap: 1rem; }
            .nav-links { width: 100%; justify-content: center; }
            .container { padding: 1rem; }
            .diagram-card { padding: 1rem; }
            .tab-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand"><h1>🤖 Clawd Dashboard</h1></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/infrastructure-new.html" class="active">Infrastructure</a>
            <a href="/agents.html">Agents</a>
            <a href="/swarm-monitor.html">🐝 Swarm</a>
            <a href="/project-vault.html">💰 Vault</a>
        </div>
    </nav>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function FlowingLine({ x1, y1, x2, y2, color = "#3182CE", delay = 0, curved = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 40 : (y1 + y2) / 2;
            const pathId = "path-" + x1 + "-" + y1 + "-" + x2 + "-" + y2;
            const pathD = curved 
                ? "M " + x1 + " " + y1 + " Q " + midX + " " + midY + " " + x2 + " " + y2
                : "M " + x1 + " " + y1 + " L " + x2 + " " + y2;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="5" fill={color}>
                        <animateMotion dur="2.5s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                    <circle cx={x1} cy={y1} r="4" fill={color} opacity="0.6" />
                    <circle cx={x2} cy={y2} r="4" fill={color} opacity="0.6" />
                </g>
            );
        }

        function ArchNode({ x, y, w, h, title, subtitle, icon, color, small = false }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 62 : 76;
            const iconSize = small ? 20 : 28;
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={6} rx={3} fill={color} />
                    <circle cx={x + w/2} cy={y + 28} r={small ? 18 : 24} fill={color + "20"} />
                    <text x={x + w/2} y={y + 33} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 11 : 13} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 9 : 10}>{subtitle}</text>}
                </g>
            );
        }

        function AgentArchitecture() {
            return (
                <svg viewBox="0 0 900 520" style={{width: "100%", minWidth: 700, height: "auto"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.1" />
                        </filter>
                    </defs>
                    
                    <ArchNode x={60} y={30} w={130} h={85} title="Telegram" subtitle="@Dlowbands" icon="📱" color="#3182CE" />
                    <ArchNode x={220} y={30} w={130} h={85} title="Web Chat" subtitle="Dashboard UI" icon="🌐" color="#38B2AC" />
                    <ArchNode x={380} y={30} w={130} h={85} title="Cron Jobs" subtitle="Scheduled" icon="⏰" color="#9F7AEA" />
                    
                    <FlowingLine x1={125} y1={115} x2={300} y2={175} color="#3182CE" delay={0} curved={true} />
                    <FlowingLine x1={285} y1={115} x2={340} y2={175} color="#38B2AC" delay={0.3} curved={true} />
                    <FlowingLine x1={445} y1={115} x2={380} y2={175} color="#9F7AEA" delay={0.6} curved={true} />
                    
                    <ArchNode x={250} y={175} w={180} h={95} title="Clawdbot Gateway" subtitle="Auth • Route • Queue" icon="🔮" color="#667EEA" />
                    
                    <FlowingLine x1={340} y1={270} x2={340} y2={320} color="#667EEA" delay={0.8} />
                    
                    <ArchNode x={230} y={320} w={220} h={100} title="Main Agent" subtitle="Claude Opus 4.5 • Conversation" icon="🧠" color="#3182CE" />
                    
                    <FlowingLine x1={230} y1={370} x2={120} y2={400} color="#48BB78" delay={1} curved={true} />
                    <ArchNode x={30} y={400} w={160} h={90} title="Context Files" subtitle="SOUL • MEMORY • TOOLS" icon="📁" color="#48BB78" />
                    
                    <FlowingLine x1={450} y1={370} x2={560} y2={340} color="#9F7AEA" delay={1.2} curved={true} />
                    <ArchNode x={530} y={300} w={140} h={80} title="Sub-Agents" subtitle="Research • Code" icon="👥" color="#9F7AEA" small={true} />
                    
                    <FlowingLine x1={600} y1={380} x2={600} y2={420} color="#E53E3E" delay={1.4} />
                    <ArchNode x={530} y={420} w={140} h={80} title="Admin Agent" subtitle="Health • Security" icon="🛡️" color="#E53E3E" small={true} />
                    
                    <FlowingLine x1={670} y1={460} x2={750} y2={430} color="#ED8936" delay={1.6} />
                    <ArchNode x={720} y={380} w={140} h={80} title="Dashboard" subtitle=":8080 • Live" icon="📊" color="#ED8936" small={true} />
                </svg>
            );
        }

        function NodeTopology() {
            return (
                <svg viewBox="0 0 900 480" style={{width: "100%", minWidth: 700, height: "auto"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.1" />
                        </filter>
                    </defs>
                    
                    <rect x={100} y={100} width={700} height={320} rx={20} fill="#F7FAFC" stroke="#38B2AC" strokeWidth="2" strokeDasharray="8,4" />
                    <text x={450} y={130} textAnchor="middle" fill="#234E52" fontSize="14" fontWeight="600">🔐 Tailscale VPN Mesh (100.x.x.x)</text>
                    
                    <ArchNode x={150} y={180} w={180} h={120} title="Mac Mini" subtitle="ORCHESTRATOR" icon="🖥️" color="#667EEA" />
                    <text x={240} y={320} textAnchor="middle" fill="#667EEA" fontSize="10" fontWeight="500">100.88.105.106</text>
                    <text x={240} y={335} textAnchor="middle" fill="#718096" fontSize="9">Ollama: qwen2.5:3b</text>
                    <text x={240} y={348} textAnchor="middle" fill="#48BB78" fontSize="9">Disk: 19% • RAM: 69%</text>
                    
                    <ArchNode x={560} y={160} w={180} h={120} title="Mac Pro" subtitle="FORT KNOX" icon="🗄️" color="#48BB78" />
                    <text x={650} y={300} textAnchor="middle" fill="#48BB78" fontSize="10" fontWeight="500">100.101.89.80</text>
                    <text x={650} y={315} textAnchor="middle" fill="#718096" fontSize="9">Backups • Shared Brain</text>
                    <text x={650} y={328} textAnchor="middle" fill="#48BB78" fontSize="9">Disk: 6% • RAM: 88%</text>
                    
                    <ArchNode x={360} y={300} w={180} h={100} title="Dell" subtitle="WORKSTATION" icon="💻" color="#ED8936" />
                    <text x={450} y={415} textAnchor="middle" fill="#ED8936" fontSize="10" fontWeight="500">100.119.87.108</text>
                    <text x={450} y={430} textAnchor="middle" fill="#718096" fontSize="9">Windows 11 • Project Vault</text>
                    
                    <FlowingLine x1={330} y1={240} x2={560} y2={220} color="#38B2AC" delay={0} />
                    <FlowingLine x1={560} y1={220} x2={330} y2={240} color="#38B2AC" delay={1.2} />
                    <FlowingLine x1={330} y1={280} x2={450} y2={300} color="#38B2AC" delay={0.4} />
                    <FlowingLine x1={450} y1={300} x2={330} y2={280} color="#38B2AC" delay={1.6} />
                    <FlowingLine x1={540} y1={350} x2={560} y2={280} color="#38B2AC" delay={0.8} />
                </svg>
            );
        }

        function DataFlow() {
            return (
                <svg viewBox="0 0 900 350" style={{width: "100%", minWidth: 700, height: "auto"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.1" />
                        </filter>
                    </defs>
                    
                    <ArchNode x={30} y={100} w={120} h={90} title="Telegram" subtitle="User Message" icon="📱" color="#3182CE" small={true} />
                    <ArchNode x={180} y={100} w={120} h={90} title="Gateway" subtitle="Route & Auth" icon="🔮" color="#667EEA" small={true} />
                    <ArchNode x={330} y={100} w={120} h={90} title="Context" subtitle="Load Files" icon="📁" color="#48BB78" small={true} />
                    <ArchNode x={480} y={100} w={120} h={90} title="LLM Query" subtitle="Opus / Ollama" icon="🧠" color="#9F7AEA" small={true} />
                    <ArchNode x={630} y={100} w={120} h={90} title="Memory" subtitle="Write Logs" icon="💾" color="#ED8936" small={true} />
                    <ArchNode x={780} y={100} w={90} h={90} title="Reply" subtitle="Send" icon="✅" color="#38B2AC" small={true} />
                    
                    <FlowingLine x1={150} y1={145} x2={180} y2={145} color="#3182CE" delay={0} />
                    <FlowingLine x1={300} y1={145} x2={330} y2={145} color="#667EEA" delay={0.4} />
                    <FlowingLine x1={450} y1={145} x2={480} y2={145} color="#48BB78" delay={0.8} />
                    <FlowingLine x1={600} y1={145} x2={630} y2={145} color="#9F7AEA" delay={1.2} />
                    <FlowingLine x1={750} y1={145} x2={780} y2={145} color="#ED8936" delay={1.6} />
                    
                    {[1,2,3,4,5,6].map((n, i) => (
                        <g key={n}>
                            <circle cx={90 + i * 150} cy={70} r={14} fill="#667EEA" />
                            <text x={90 + i * 150} y={75} textAnchor="middle" fill="white" fontSize="12" fontWeight="bold">{n}</text>
                        </g>
                    ))}
                    
                    <rect x={100} y={230} width={200} height={100} rx={10} fill="#F7FAFC" stroke="#E2E8F0" />
                    <text x={200} y={255} textAnchor="middle" fill="#1A202C" fontSize="11" fontWeight="600">Context Files</text>
                    <text x={200} y={275} textAnchor="middle" fill="#718096" fontSize="9">AGENTS.md • SOUL.md</text>
                    <text x={200} y={290} textAnchor="middle" fill="#718096" fontSize="9">MEMORY.md • TOOLS.md</text>
                    <text x={200} y={305} textAnchor="middle" fill="#718096" fontSize="9">HEARTBEAT.md</text>
                    
                    <rect x={350} y={230} width={200} height={100} rx={10} fill="#F7FAFC" stroke="#E2E8F0" />
                    <text x={450} y={255} textAnchor="middle" fill="#1A202C" fontSize="11" fontWeight="600">LLM Options</text>
                    <text x={450} y={275} textAnchor="middle" fill="#9F7AEA" fontSize="9">Claude Opus 4.5 (Primary)</text>
                    <text x={450} y={290} textAnchor="middle" fill="#48BB78" fontSize="9">Ollama qwen2.5:3b (Local)</text>
                    <text x={450} y={305} textAnchor="middle" fill="#718096" fontSize="9">NVIDIA Kimi (Vision)</text>
                    
                    <rect x={600} y={230} width={200} height={100} rx={10} fill="#F7FAFC" stroke="#E2E8F0" />
                    <text x={700} y={255} textAnchor="middle" fill="#1A202C" fontSize="11" fontWeight="600">Memory System</text>
                    <text x={700} y={275} textAnchor="middle" fill="#718096" fontSize="9">memory/YYYY-MM-DD.md</text>
                    <text x={700} y={290} textAnchor="middle" fill="#718096" fontSize="9">shared-memory/*.json</text>
                    <text x={700} y={305} textAnchor="middle" fill="#718096" fontSize="9">Dashboard reads live</text>
                </svg>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState("agents");
            
            const tabs = [
                { id: "agents", label: "🤖 Agent Architecture", component: AgentArchitecture },
                { id: "nodes", label: "🌐 Multi-Node Topology", component: NodeTopology },
                { id: "flow", label: "📊 Data Flow", component: DataFlow }
            ];
            
            const ActiveDiagram = tabs.find(t => t.id === activeTab)?.component || AgentArchitecture;
            
            return (
                <div className="container">
                    <div className="section-tabs">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={"tab-btn " + (activeTab === tab.id ? "active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>{tabs.find(t => t.id === activeTab)?.label}</h2>
                            <p>Interactive architecture visualization</p>
                        </div>
                        <div className="diagram-svg">
                            <ActiveDiagram />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
