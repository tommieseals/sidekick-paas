        function FlowingLine({ x1, y1, x2, y2, color = "#48BB78", delay = 0, curved = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 30 : (y1 + y2) / 2;
            const pathD = curved 
                ? "M " + x1 + " " + y1 + " Q " + midX + " " + midY + " " + x2 + " " + y2
                : "M " + x1 + " " + y1 + " L " + x2 + " " + y2;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="4" fill={color}>
                        <animateMotion dur="2s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                </g>
            );
        }

        function ArchNode({ x, y, w, h, title, subtitle, icon, color, small = false, highlight = false, badge = null }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 62 : 76;
            const iconSize = small ? 18 : 26;
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill={highlight ? "#FFFBEB" : "white"} stroke={highlight ? "#F6AD55" : "#E2E8F0"} strokeWidth={highlight ? 2 : 1} filter="url(#shadow)" />

                    <circle cx={x + w/2} cy={y + 28} r={small ? 16 : 22} fill={color + "20"} />
                    <text x={x + w/2} y={y + 33} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 10 : 12} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 8 : 10}>{subtitle}</text>}
                    {badge && (
                        <g>
                            <rect x={x + w - 35} y={y - 8} width={42} height={18} rx={9} fill="#48BB78" />
                            <text x={x + w - 14} y={y + 2} textAnchor="middle" fill="white" fontSize="9" fontWeight="600">{badge}</text>

                    )}
                </g>
            );

        function StatsBar() {

                { value: "95", label: "Orphan Designations" },
                { value: "79", label: "PubMed Articles" },
                { value: "15", label: "Active Opportunities" },
                { value: "10,000x", label: "Max ROI Potential" },
                { value: "45→200", label: "Twitter Targets" }
            ];
            
            return (
                <div className="stats-bar">
                    {stats.map((stat, i) => (
                        <div key={i} className="stat-card">

        function App() {
            const [activeTab, setActiveTab] = useState("discovery");
            
            const tabs = [
                { id: "discovery", label: "🔬 Discovery Pipeline", component: DiscoveryPipeline, desc: "Data sourcing → Processing → Analysis → Opportunities" },
                { id: "scoring", label: "📊 Opportunity Scoring", component: OpportunityScoring, desc: "ROI × Risk × Competition → Ranked targets" },
                { id: "tracking", label: "🎯 Target Tracking", component: TargetTracking, desc: "Priority targets → Outreach → Deal pipeline" },
                { id: "intel", label: "🕵️ Intelligence Sources", component: IntelligenceSources, desc: "10+ data feeds → Central aggregation" }
            ];
            
            const ActiveDiagram = tabs.find(t => t.id === activeTab)?.component || DiscoveryPipeline;
            const activeDesc = tabs.find(t => t.id === activeTab)?.desc || "";
            
            return (
                <div className="container">
                    <StatsBar />
                    
                    <div className="section-tabs">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={"tab-btn " + (activeTab === tab.id ? "active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>{tabs.find(t => t.id === activeTab)?.label}</h2>
                            <p>{activeDesc}</p>
                        </div>
                        <div className="diagram-svg">
                            <ActiveDiagram />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
