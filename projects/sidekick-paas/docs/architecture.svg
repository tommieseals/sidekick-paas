<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#010409"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#3fb950" font-size="26" font-weight="bold">
    🚀 SIDEKICK PAAS ARCHITECTURE
  </text>
  <text x="450" y="72" text-anchor="middle" fill="#7d8590" font-size="13">
    Zero-Config Platform-as-a-Service
  </text>
  
  <!-- Input -->
  <rect x="350" y="95" width="200" height="50" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="118" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">GitHub Repository URL</text>
  <text x="450" y="135" text-anchor="middle" fill="#7d8590" font-size="9">github.com/user/repo</text>
  
  <!-- Arrow -->
  <path d="M450 145 L450 170" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
  </defs>
  
  <!-- Pipeline Box -->
  <rect x="100" y="180" width="700" height="160" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="450" y="205" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">DEPLOYMENT PIPELINE</text>
  
  <!-- Pipeline Steps -->
  <rect x="130" y="225" width="100" height="80" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="180" y="250" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">1. Clone</text>
  <text x="180" y="270" text-anchor="middle" fill="#7d8590" font-size="8">simple-git</text>
  <text x="180" y="285" text-anchor="middle" fill="#7d8590" font-size="8">Pull repo</text>
  
  <path d="M230 265 L260 265" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  <defs>
    <marker id="arrowSmall" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
  </defs>
  
  <rect x="265" y="225" width="100" height="80" rx="6" fill="#0d1117" stroke="#d29922" stroke-width="1"/>
  <text x="315" y="250" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">2. Detect</text>
  <text x="315" y="270" text-anchor="middle" fill="#7d8590" font-size="8">Node/Python</text>
  <text x="315" y="285" text-anchor="middle" fill="#7d8590" font-size="8">Go/Rust/Static</text>
  
  <path d="M365 265 L395 265" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  
  <rect x="400" y="225" width="100" height="80" rx="6" fill="#0d1117" stroke="#a371f7" stroke-width="1"/>
  <text x="450" y="250" text-anchor="middle" fill="#a371f7" font-size="10" font-weight="bold">3. Generate</text>
  <text x="450" y="270" text-anchor="middle" fill="#7d8590" font-size="8">Dockerfile</text>
  <text x="450" y="285" text-anchor="middle" fill="#7d8590" font-size="8">Multi-stage</text>
  
  <path d="M500 265 L530 265" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  
  <rect x="535" y="225" width="100" height="80" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="585" y="250" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold">4. Build</text>
  <text x="585" y="270" text-anchor="middle" fill="#7d8590" font-size="8">Docker image</text>
  <text x="585" y="285" text-anchor="middle" fill="#7d8590" font-size="8">Dockerode</text>
  
  <path d="M635 265 L665 265" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  
  <rect x="670" y="225" width="100" height="80" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="720" y="250" text-anchor="middle" fill="#f85149" font-size="10" font-weight="bold">5. Deploy</text>
  <text x="720" y="270" text-anchor="middle" fill="#7d8590" font-size="8">Container</text>
  <text x="720" y="285" text-anchor="middle" fill="#7d8590" font-size="8">+ Nginx + SSL</text>
  
  <!-- Infrastructure Layer -->
  <rect x="100" y="365" width="330" height="170" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="265" y="390" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">SIDEKICK ENGINE</text>
  
  <rect x="120" y="410" width="90" height="45" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="165" y="430" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="bold">Express API</text>
  <text x="165" y="445" text-anchor="middle" fill="#7d8590" font-size="8">REST + WS</text>
  
  <rect x="220" y="410" width="90" height="45" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="1"/>
  <text x="265" y="430" text-anchor="middle" fill="#d29922" font-size="9" font-weight="bold">Detector</text>
  <text x="265" y="445" text-anchor="middle" fill="#7d8590" font-size="8">Auto-detect</text>
  
  <rect x="320" y="410" width="90" height="45" rx="4" fill="#0d1117" stroke="#a371f7" stroke-width="1"/>
  <text x="365" y="430" text-anchor="middle" fill="#a371f7" font-size="9" font-weight="bold">Builder</text>
  <text x="365" y="445" text-anchor="middle" fill="#7d8590" font-size="8">Dockerfile gen</text>
  
  <rect x="120" y="465" width="90" height="45" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="165" y="485" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="bold">Docker</text>
  <text x="165" y="500" text-anchor="middle" fill="#7d8590" font-size="8">Dockerode</text>
  
  <rect x="220" y="465" width="90" height="45" rx="4" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="265" y="485" text-anchor="middle" fill="#f85149" font-size="9" font-weight="bold">Nginx</text>
  <text x="265" y="500" text-anchor="middle" fill="#7d8590" font-size="8">Proxy config</text>
  
  <rect x="320" y="465" width="90" height="45" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="365" y="485" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="bold">Certbot</text>
  <text x="365" y="500" text-anchor="middle" fill="#7d8590" font-size="8">SSL certs</text>
  
  <!-- Running Apps -->
  <rect x="470" y="365" width="330" height="170" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="635" y="390" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">DEPLOYED APPS</text>
  
  <rect x="490" y="410" width="130" height="110" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="555" y="432" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold">🐳 Container 1</text>
  <text x="555" y="450" text-anchor="middle" fill="#7d8590" font-size="8">my-nextjs-app</text>
  <text x="555" y="468" text-anchor="middle" fill="#3fb950" font-size="8">● RUNNING</text>
  <text x="555" y="490" text-anchor="middle" fill="#7d8590" font-size="8">Port 32771</text>
  <text x="555" y="508" text-anchor="middle" fill="#58a6ff" font-size="8">🔒 SSL Enabled</text>
  
  <rect x="650" y="410" width="130" height="110" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="715" y="432" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold">🐳 Container 2</text>
  <text x="715" y="450" text-anchor="middle" fill="#7d8590" font-size="8">api-server</text>
  <text x="715" y="468" text-anchor="middle" fill="#3fb950" font-size="8">● RUNNING</text>
  <text x="715" y="490" text-anchor="middle" fill="#7d8590" font-size="8">Port 32772</text>
  <text x="715" y="508" text-anchor="middle" fill="#58a6ff" font-size="8">🔒 SSL Enabled</text>
  
  <!-- Network -->
  <rect x="100" y="560" width="700" height="60" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="450" y="585" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">🌐 NGINX REVERSE PROXY</text>
  <text x="450" y="605" text-anchor="middle" fill="#7d8590" font-size="10">*.example.com → Container routing | SSL termination | WebSocket support</text>
  
  <!-- Output -->
  <rect x="300" y="640" width="300" height="45" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="660" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">✅ https://myapp.example.com</text>
  <text x="450" y="676" text-anchor="middle" fill="#7d8590" font-size="9">Zero-config deployment complete</text>
  
  <!-- Arrows connecting sections -->
  <path d="M265 340 L265 365" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M635 340 L635 365" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M265 535 L265 560" stroke="#d29922" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M635 535 L635 560" stroke="#d29922" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M450 620 L450 640" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
