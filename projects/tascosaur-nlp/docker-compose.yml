# ============================================
# 🦖 TASCOSAUR NLP - Docker Compose
# ============================================
# Production-ready deployment with optional Ollama

version: '3.8'

services:
  # Main Application
  tascosaur:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tascosaur-nlp
    ports:
      - "3001:3001"
    volumes:
      # Persist SQLite database
      - tascosaur-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - tascosaur-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Local Ollama for LLM enhancement
  ollama:
    image: ollama/ollama:latest
    container_name: tascosaur-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - tascosaur-net
    # Pull model on first start (optional)
    # entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:3b && wait"]

volumes:
  tascosaur-data:
    driver: local
  ollama-data:
    driver: local

networks:
  tascosaur-net:
    driver: bridge
