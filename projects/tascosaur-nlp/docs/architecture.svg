<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#05d9e8"/>
      <stop offset="100%" style="stop-color:#01ff70"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2a6d"/>
      <stop offset="100%" style="stop-color:#d300c5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  
  <!-- Grid -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#05d9e8" stroke-opacity="0.1" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="600" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#05d9e8" font-size="24" font-weight="bold" filter="url(#glow)">
    🦖 TASCOSAUR NLP ARCHITECTURE
  </text>
  <text x="450" y="70" text-anchor="middle" fill="#666" font-size="12">
    Natural Language Task Management System
  </text>
  
  <!-- User Layer -->
  <rect x="360" y="90" width="180" height="60" rx="8" fill="#12121a" stroke="#05d9e8" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" fill="#05d9e8" font-size="12" font-weight="bold">USER INPUT</text>
  <text x="450" y="135" text-anchor="middle" fill="#888" font-size="10">"Create high-priority bug for login"</text>
  
  <!-- Arrow -->
  <path d="M450 150 L450 180" stroke="#05d9e8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#05d9e8"/>
    </marker>
  </defs>
  
  <!-- Frontend Box -->
  <rect x="50" y="190" width="250" height="180" rx="10" fill="#12121a" stroke="#ff2a6d" stroke-width="2"/>
  <text x="175" y="215" text-anchor="middle" fill="#ff2a6d" font-size="14" font-weight="bold">FRONTEND</text>
  <text x="175" y="235" text-anchor="middle" fill="#666" font-size="10">React + Vite + Tailwind</text>
  
  <rect x="70" y="250" width="100" height="35" rx="4" fill="#1a1a24" stroke="#05d9e8" stroke-width="1"/>
  <text x="120" y="272" text-anchor="middle" fill="#05d9e8" font-size="10">Command Bar</text>
  
  <rect x="180" y="250" width="100" height="35" rx="4" fill="#1a1a24" stroke="#05d9e8" stroke-width="1"/>
  <text x="230" y="272" text-anchor="middle" fill="#05d9e8" font-size="10">Kanban Board</text>
  
  <rect x="70" y="295" width="100" height="35" rx="4" fill="#1a1a24" stroke="#f9f002" stroke-width="1"/>
  <text x="120" y="317" text-anchor="middle" fill="#f9f002" font-size="10">Parse Preview</text>
  
  <rect x="180" y="295" width="100" height="35" rx="4" fill="#1a1a24" stroke="#01ff70" stroke-width="1"/>
  <text x="230" y="317" text-anchor="middle" fill="#01ff70" font-size="10">WebSocket</text>
  
  <text x="175" y="355" text-anchor="middle" fill="#666" font-size="9">Cyberpunk UI Theme</text>
  
  <!-- NLP Engine Box -->
  <rect x="325" y="190" width="250" height="180" rx="10" fill="#12121a" stroke="#05d9e8" stroke-width="2"/>
  <text x="450" y="215" text-anchor="middle" fill="#05d9e8" font-size="14" font-weight="bold">NLP ENGINE</text>
  <text x="450" y="235" text-anchor="middle" fill="#666" font-size="10">Node.js + Compromise.js</text>
  
  <rect x="345" y="250" width="90" height="50" rx="4" fill="#1a1a24" stroke="#ff2a6d" stroke-width="1"/>
  <text x="390" y="272" text-anchor="middle" fill="#ff2a6d" font-size="9">Intent</text>
  <text x="390" y="287" text-anchor="middle" fill="#ff2a6d" font-size="9">Classifier</text>
  
  <rect x="445" y="250" width="90" height="50" rx="4" fill="#1a1a24" stroke="#01ff70" stroke-width="1"/>
  <text x="490" y="272" text-anchor="middle" fill="#01ff70" font-size="9">Entity</text>
  <text x="490" y="287" text-anchor="middle" fill="#01ff70" font-size="9">Extractor</text>
  
  <rect x="395" y="310" width="90" height="50" rx="4" fill="#1a1a24" stroke="#d300c5" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle" fill="#d300c5" font-size="9">LLM Fallback</text>
  <text x="440" y="347" text-anchor="middle" fill="#d300c5" font-size="9">(Ollama)</text>
  
  <!-- Backend/Storage Box -->
  <rect x="600" y="190" width="250" height="180" rx="10" fill="#12121a" stroke="#01ff70" stroke-width="2"/>
  <text x="725" y="215" text-anchor="middle" fill="#01ff70" font-size="14" font-weight="bold">BACKEND</text>
  <text x="725" y="235" text-anchor="middle" fill="#666" font-size="10">Express + Socket.io</text>
  
  <rect x="620" y="250" width="100" height="35" rx="4" fill="#1a1a24" stroke="#05d9e8" stroke-width="1"/>
  <text x="670" y="272" text-anchor="middle" fill="#05d9e8" font-size="10">REST API</text>
  
  <rect x="730" y="250" width="100" height="35" rx="4" fill="#1a1a24" stroke="#f9f002" stroke-width="1"/>
  <text x="780" y="272" text-anchor="middle" fill="#f9f002" font-size="10">WebSocket</text>
  
  <rect x="675" y="300" width="100" height="50" rx="4" fill="#1a1a24" stroke="#01ff70" stroke-width="1"/>
  <text x="725" y="322" text-anchor="middle" fill="#01ff70" font-size="10">SQLite DB</text>
  <text x="725" y="337" text-anchor="middle" fill="#666" font-size="9">WAL Mode</text>
  
  <!-- Arrows between boxes -->
  <path d="M300 280 L325 280" stroke="#05d9e8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M575 280 L600 280" stroke="#05d9e8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Docker Container -->
  <rect x="50" y="400" width="800" height="90" rx="10" fill="none" stroke="#05d9e8" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="70" y="425" fill="#05d9e8" font-size="12" font-weight="bold">🐳 DOCKER CONTAINER</text>
  
  <rect x="70" y="440" width="120" height="35" rx="4" fill="#1a1a24" stroke="#ff2a6d" stroke-width="1"/>
  <text x="130" y="462" text-anchor="middle" fill="#ff2a6d" font-size="10">Port 3001</text>
  
  <rect x="210" y="440" width="120" height="35" rx="4" fill="#1a1a24" stroke="#01ff70" stroke-width="1"/>
  <text x="270" y="462" text-anchor="middle" fill="#01ff70" font-size="10">SQLite Volume</text>
  
  <rect x="350" y="440" width="120" height="35" rx="4" fill="#1a1a24" stroke="#d300c5" stroke-width="1"/>
  <text x="410" y="462" text-anchor="middle" fill="#d300c5" font-size="10">Ollama (opt)</text>
  
  <rect x="490" y="440" width="120" height="35" rx="4" fill="#1a1a24" stroke="#05d9e8" stroke-width="1"/>
  <text x="550" y="462" text-anchor="middle" fill="#05d9e8" font-size="10">Health Check</text>
  
  <!-- Data Flow Legend -->
  <rect x="630" y="420" width="200" height="65" rx="6" fill="#0d0d14" stroke="#333" stroke-width="1"/>
  <text x="730" y="440" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">Data Flow</text>
  <line x1="650" y1="455" x2="680" y2="455" stroke="#05d9e8" stroke-width="2"/>
  <text x="690" y="459" fill="#666" font-size="9">HTTP/WS</text>
  <line x1="650" y1="473" x2="680" y2="473" stroke="#01ff70" stroke-width="2"/>
  <text x="690" y="477" fill="#666" font-size="9">Real-time</text>
  
  <!-- Intent Types -->
  <rect x="50" y="510" width="800" height="70" rx="8" fill="#0d0d14" stroke="#333" stroke-width="1"/>
  <text x="450" y="535" text-anchor="middle" fill="#888" font-size="12" font-weight="bold">Supported Intents</text>
  
  <rect x="80" y="545" width="80" height="25" rx="4" fill="#01ff70" fill-opacity="0.2" stroke="#01ff70" stroke-width="1"/>
  <text x="120" y="562" text-anchor="middle" fill="#01ff70" font-size="10">CREATE</text>
  
  <rect x="180" y="545" width="80" height="25" rx="4" fill="#f9f002" fill-opacity="0.2" stroke="#f9f002" stroke-width="1"/>
  <text x="220" y="562" text-anchor="middle" fill="#f9f002" font-size="10">UPDATE</text>
  
  <rect x="280" y="545" width="80" height="25" rx="4" fill="#ff2a6d" fill-opacity="0.2" stroke="#ff2a6d" stroke-width="1"/>
  <text x="320" y="562" text-anchor="middle" fill="#ff2a6d" font-size="10">DELETE</text>
  
  <rect x="380" y="545" width="80" height="25" rx="4" fill="#d300c5" fill-opacity="0.2" stroke="#d300c5" stroke-width="1"/>
  <text x="420" y="562" text-anchor="middle" fill="#d300c5" font-size="10">MOVE</text>
  
  <rect x="480" y="545" width="80" height="25" rx="4" fill="#05d9e8" fill-opacity="0.2" stroke="#05d9e8" stroke-width="1"/>
  <text x="520" y="562" text-anchor="middle" fill="#05d9e8" font-size="10">QUERY</text>
  
  <!-- Performance Stats -->
  <rect x="600" y="545" width="230" height="25" rx="4" fill="#1a1a24" stroke="#05d9e8" stroke-width="1"/>
  <text x="715" y="562" text-anchor="middle" fill="#05d9e8" font-size="10">⚡ &lt;100ms parse time (regex) | LLM fallback available</text>
</svg>
