<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="650" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#3B82F6" font-size="26" font-weight="bold">
    💹 INVESTRAIN AI ARCHITECTURE
  </text>
  <text x="450" y="72" text-anchor="middle" fill="#64748B" font-size="13">
    RAG-Powered Financial Intelligence Platform
  </text>
  
  <!-- User Layer -->
  <rect x="350" y="95" width="200" height="55" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
  <text x="450" y="118" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="bold">USER INTERFACE</text>
  <text x="450" y="138" text-anchor="middle" fill="#94A3B8" font-size="10">Next.js Dashboard + AI Chat</text>
  
  <!-- Arrow down -->
  <path d="M450 150 L450 175" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
  </defs>
  
  <!-- Main Boxes -->
  
  <!-- Frontend -->
  <rect x="50" y="185" width="240" height="200" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
  <text x="170" y="212" text-anchor="middle" fill="#3B82F6" font-size="14" font-weight="bold">FRONTEND</text>
  <text x="170" y="232" text-anchor="middle" fill="#64748B" font-size="10">Next.js 14 + React 18</text>
  
  <rect x="70" y="250" width="90" height="40" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="1"/>
  <text x="115" y="275" text-anchor="middle" fill="#10B981" font-size="10">Portfolio</text>
  
  <rect x="170" y="250" width="90" height="40" rx="6" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
  <text x="215" y="275" text-anchor="middle" fill="#F59E0B" font-size="10">Charts</text>
  
  <rect x="70" y="300" width="90" height="40" rx="6" fill="#0F172A" stroke="#8B5CF6" stroke-width="1"/>
  <text x="115" y="325" text-anchor="middle" fill="#8B5CF6" font-size="10">AI Chat</text>
  
  <rect x="170" y="300" width="90" height="40" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="215" y="325" text-anchor="middle" fill="#EF4444" font-size="10">Holdings</text>
  
  <text x="170" y="370" text-anchor="middle" fill="#475569" font-size="9">Recharts • Tailwind • Framer</text>
  
  <!-- Backend -->
  <rect x="330" y="185" width="240" height="200" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
  <text x="450" y="212" text-anchor="middle" fill="#10B981" font-size="14" font-weight="bold">BACKEND API</text>
  <text x="450" y="232" text-anchor="middle" fill="#64748B" font-size="10">Express.js + RAG Engine</text>
  
  <rect x="350" y="250" width="90" height="40" rx="6" fill="#0F172A" stroke="#3B82F6" stroke-width="1"/>
  <text x="395" y="268" text-anchor="middle" fill="#3B82F6" font-size="9">Portfolio</text>
  <text x="395" y="282" text-anchor="middle" fill="#3B82F6" font-size="9">API</text>
  
  <rect x="450" y="250" width="90" height="40" rx="6" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
  <text x="495" y="268" text-anchor="middle" fill="#F59E0B" font-size="9">Market</text>
  <text x="495" y="282" text-anchor="middle" fill="#F59E0B" font-size="9">Data</text>
  
  <rect x="350" y="300" width="90" height="40" rx="6" fill="#0F172A" stroke="#8B5CF6" stroke-width="1"/>
  <text x="395" y="318" text-anchor="middle" fill="#8B5CF6" font-size="9">RAG</text>
  <text x="395" y="332" text-anchor="middle" fill="#8B5CF6" font-size="9">Engine</text>
  
  <rect x="450" y="300" width="90" height="40" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="1"/>
  <text x="495" y="318" text-anchor="middle" fill="#10B981" font-size="9">Risk</text>
  <text x="495" y="332" text-anchor="middle" fill="#10B981" font-size="9">Metrics</text>
  
  <text x="450" y="370" text-anchor="middle" fill="#475569" font-size="9">SQLite • node-cache</text>
  
  <!-- External Services -->
  <rect x="610" y="185" width="240" height="200" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
  <text x="730" y="212" text-anchor="middle" fill="#8B5CF6" font-size="14" font-weight="bold">EXTERNAL SERVICES</text>
  
  <rect x="630" y="240" width="200" height="55" rx="6" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
  <text x="730" y="262" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="bold">Alpha Vantage API</text>
  <text x="730" y="280" text-anchor="middle" fill="#64748B" font-size="9">Stock quotes + history</text>
  
  <rect x="630" y="305" width="200" height="55" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="1"/>
  <text x="730" y="327" text-anchor="middle" fill="#10B981" font-size="11" font-weight="bold">Ollama LLM</text>
  <text x="730" y="345" text-anchor="middle" fill="#64748B" font-size="9">qwen2.5:3b / llama2</text>
  
  <!-- Arrows -->
  <path d="M290 280 L330 280" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M570 280 L610 280" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M570 330 L610 330" stroke="#10B981" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- RAG Pipeline -->
  <rect x="50" y="410" width="800" height="120" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
  <text x="450" y="435" text-anchor="middle" fill="#8B5CF6" font-size="14" font-weight="bold">🧠 RAG PIPELINE (Retrieval-Augmented Generation)</text>
  
  <rect x="80" y="455" width="130" height="55" rx="6" fill="#0F172A" stroke="#3B82F6" stroke-width="1"/>
  <text x="145" y="478" text-anchor="middle" fill="#3B82F6" font-size="10" font-weight="bold">1. User Query</text>
  <text x="145" y="495" text-anchor="middle" fill="#64748B" font-size="8">"What's my risk?"</text>
  
  <path d="M210 482 L240 482" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  <defs>
    <marker id="arrowSmall" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>
  
  <rect x="245" y="455" width="130" height="55" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="1"/>
  <text x="310" y="478" text-anchor="middle" fill="#10B981" font-size="10" font-weight="bold">2. Retrieve Context</text>
  <text x="310" y="495" text-anchor="middle" fill="#64748B" font-size="8">Holdings + Prices + Risk</text>
  
  <path d="M375 482 L405 482" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  
  <rect x="410" y="455" width="130" height="55" rx="6" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
  <text x="475" y="478" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="bold">3. Build Prompt</text>
  <text x="475" y="495" text-anchor="middle" fill="#64748B" font-size="8">Inject financial data</text>
  
  <path d="M540 482 L570 482" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  
  <rect x="575" y="455" width="130" height="55" rx="6" fill="#0F172A" stroke="#8B5CF6" stroke-width="1"/>
  <text x="640" y="478" text-anchor="middle" fill="#8B5CF6" font-size="10" font-weight="bold">4. LLM Response</text>
  <text x="640" y="495" text-anchor="middle" fill="#64748B" font-size="8">Natural language answer</text>
  
  <path d="M705 482 L735 482" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  
  <rect x="740" y="455" width="90" height="55" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="785" y="478" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="bold">5. Display</text>
  <text x="785" y="495" text-anchor="middle" fill="#64748B" font-size="8">+ Charts</text>
  
  <!-- Docker Container -->
  <rect x="50" y="550" width="550" height="80" rx="10" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="70" y="575" fill="#3B82F6" font-size="12" font-weight="bold">🐳 DOCKER CONTAINER</text>
  
  <rect x="70" y="590" width="100" height="30" rx="4" fill="#0F172A" stroke="#10B981" stroke-width="1"/>
  <text x="120" y="610" text-anchor="middle" fill="#10B981" font-size="9">Port 3001</text>
  
  <rect x="180" y="590" width="100" height="30" rx="4" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
  <text x="230" y="610" text-anchor="middle" fill="#F59E0B" font-size="9">SQLite Volume</text>
  
  <rect x="290" y="590" width="100" height="30" rx="4" fill="#0F172A" stroke="#8B5CF6" stroke-width="1"/>
  <text x="340" y="610" text-anchor="middle" fill="#8B5CF6" font-size="9">Ollama</text>
  
  <rect x="400" y="590" width="100" height="30" rx="4" fill="#0F172A" stroke="#3B82F6" stroke-width="1"/>
  <text x="450" y="610" text-anchor="middle" fill="#3B82F6" font-size="9">Health Check</text>
  
  <!-- Tech Stack Legend -->
  <rect x="620" y="550" width="230" height="80" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="735" y="575" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="bold">Tech Stack</text>
  <text x="640" y="598" fill="#3B82F6" font-size="9">• Next.js 14 + React 18</text>
  <text x="640" y="615" fill="#10B981" font-size="9">• Express + SQLite + RAG</text>
  <text x="760" y="598" fill="#8B5CF6" font-size="9">• Ollama LLM</text>
  <text x="760" y="615" fill="#F59E0B" font-size="9">• Recharts</text>
</svg>
