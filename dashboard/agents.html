    <script type="text/babel">
        const { useState } = React;

        function FlowingLine({ x1, y1, x2, y2, color = "#3182CE", delay = 0, curved = false, bidirectional = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 40 : (y1 + y2) / 2;
            const pathD = curved 
                ? "M " + x1 + " " + y1 + " Q " + midX + " " + midY + " " + x2 + " " + y2
                : "M " + x1 + " " + y1 + " L " + x2 + " " + y2;
            const reversePath = curved
                ? "M " + x2 + " " + y2 + " Q " + midX + " " + midY + " " + x1 + " " + y1
                : "M " + x2 + " " + y2 + " L " + x1 + " " + y1;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="5" fill={color}>
                        <animateMotion dur="2.5s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                    {bidirectional && (
                        <circle r="4" fill={color} opacity="0.7">
                            <animateMotion dur="2.5s" repeatCount="indefinite" begin={(delay + 1.25) + "s"} path={reversePath} />
                        </circle>
                    )}
                    <circle cx={x1} cy={y1} r="4" fill={color} opacity="0.6" />
                    <circle cx={x2} cy={y2} r="4" fill={color} opacity="0.6" />
                </g>
            );
        }

        function ArchNode({ x, y, w, h, title, subtitle, icon, color, small = false, status = null }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 62 : 76;
            const iconSize = small ? 20 : 28;
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={6} rx={3} fill={color} />
                    <circle cx={x + w/2} cy={y + 28} r={small ? 18 : 24} fill={color + "20"} />
                    <text x={x + w/2} y={y + 33} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 11 : 13} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 9 : 10}>{subtitle}</text>}
                    {status && (
                        <g>
                            <circle cx={x + w - 12} cy={y + 12} r="6" fill={status === "active" ? "#48BB78" : status === "idle" ? "#ECC94B" : "#E53E3E"} />
                            <circle cx={x + w - 12} cy={y + 12} r="6" fill={status === "active" ? "#48BB78" : "transparent"}>
                                <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite" />
                                <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
                            </circle>
                        </g>
                    )}
                </g>
            );
        }

                    <rect x={620} y={450} width={240} height={100} rx={12} fill="#FAF5FF" stroke="#9F7AEA" strokeWidth="2" />
                    <text x={740} y={475} textAnchor="middle" fill="#553C9A" fontSize="11" fontWeight="600">🐝 SUB-AGENT SESSION</text>
                    <text x={740} y={495} textAnchor="middle" fill="#4A5568" fontSize="10">Spawned by main agent</text>
                    <text x={740} y={510} textAnchor="middle" fill="#718096" fontSize="9">Task-focused • Ephemeral</text>
                    <text x={740} y={525} textAnchor="middle" fill="#718096" fontSize="9">Reports back when done</text>
                    
                    {/* Legend */}
                    <rect x={750} y={60} width={170} height={120} rx={10} fill="#F7FAFC" stroke="#E2E8F0" />
                    <text x={835} y={85} textAnchor="middle" fill="#1A202C" fontSize="11" fontWeight="600">Status Legend</text>
                    <circle cx={775} cy={105} r={6} fill="#48BB78" />
                    <text x={790} y={109} fill="#718096" fontSize="10">Active</text>
                    <circle cx={775} cy={125} r={6} fill="#ECC94B" />
                    <text x={790} y={129} fill="#718096" fontSize="10">Idle</text>
                    <circle cx={775} cy={145} r={6} fill="#E53E3E" />
                    <text x={790} y={149} fill="#718096" fontSize="10">Error</text>
                    <circle cx={775} cy={165} r={6} fill="#A0AEC0" />
                    <text x={790} y={169} fill="#718096" fontSize="10">Inactive</text>
                </svg>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState("types");
            
            const tabs = [
                { id: "types", label: "🤖 Agent Types", component: AgentTypes, desc: "Main agents, sub-agents, admin, and cron systems" },
                { id: "lifecycle", label: "🔄 Lifecycle", component: AgentLifecycle, desc: "How agents spawn, process, and respond" },
                { id: "sessions", label: "📋 Session Management", component: SessionManagement, desc: "Session routing and types" }
            ];
            
            const activeTabData = tabs.find(t => t.id === activeTab);
            const ActiveDiagram = activeTabData?.component || AgentTypes;
            
            return (
                <div className="container">
                    <div className="section-tabs">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={"tab-btn " + (activeTab === tab.id ? "active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>{activeTabData?.label}</h2>
                            <p>{activeTabData?.desc}</p>
                        </div>
                        <div className="diagram-svg">
                            <ActiveDiagram />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
