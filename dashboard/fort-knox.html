        const { useState } = React;

        function FlowingLine({ x1, y1, x2, y2, color = "#ffd700", delay = 0, curved = false, reverse = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 40 : (y1 + y2) / 2;
            const pathD = curved 
                ? `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`
                : `M ${x1} ${y1} L ${x2} ${y2}`;
            const reversePath = curved 
                ? `M ${x2} ${y2} Q ${midX} ${midY} ${x1} ${y1}`
                : `M ${x2} ${y2} L ${x1} ${y1}`;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="3" strokeDasharray="8,4" />
                    <circle r="6" fill={color}>
                        <animateMotion dur="2s" repeatCount="indefinite" begin={delay + "s"} path={reverse ? reversePath : pathD} />
                    </circle>
                    <circle r="4" fill={color} opacity="0.5">
                        <animateMotion dur="2s" repeatCount="indefinite" begin={(delay + 0.5) + "s"} path={reverse ? reversePath : pathD} />
                    </circle>
                </g>
            );
        }

        function ArchNode({ x, y, w, h, title, subtitle, icon, color, status, small = false }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 62 : 76;
            const iconSize = small ? 20 : 28;
            const statusY = small ? 76 : 92;
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={6} rx={3} fill={color} />
                    <circle cx={x + w/2} cy={y + 28} r={small ? 18 : 24} fill={color + "20"} />
                    <text x={x + w/2} y={y + 33} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 11 : 13} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 9 : 10}>{subtitle}</text>}
                    {status && <text x={x + w/2} y={y + statusY} textAnchor="middle" fill="#48BB78" fontSize={small ? 8 : 9}>{status}</text>}
                </g>
            );
        }

                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>{tabs.find(t => t.id === activeTab)?.label}</h2>
                            <p>Interactive backup system visualization</p>
                        </div>
                        <div className="diagram-svg">
                            <ActiveDiagram />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
