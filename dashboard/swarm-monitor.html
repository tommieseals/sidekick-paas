<!DOCTYPE html>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 50%, #92400E 100%);
            min-height: 100vh;
            color: #fff;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.1);
        }
        .nav-brand h1 { font-size: 1.8rem; }
        .nav-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .section-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.25); }
        .tab-btn.active {
            background: linear-gradient(135deg, #78350F, #92400E);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .diagram-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .diagram-title {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .diagram-title h2 {
            color: #78350F;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .diagram-title p {
            color: #92400E;
            font-size: 1rem;
        }
        .diagram-svg {
            width: 100%;
            overflow-x: auto;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.15);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online { background: #10B981; }
        .status-dot.busy { background: #F59E0B; }
        .status-dot.offline { background: #EF4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        @media (max-width: 768px) {
            .nav-bar { flex-wrap: wrap; gap: 1rem; }
            .nav-links { width: 100%; justify-content: center; }
            .container { padding: 1rem; }
            .diagram-card { padding: 1rem; }
            .tab-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
        }

    <script type="text/babel">
        const { useState } = React;

        // Animated flowing particle along path
        function FlowingLine({ x1, y1, x2, y2, color = "#F59E0B", delay = 0, curved = false, reverse = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 50 : (y1 + y2) / 2;
            const pathD = curved 
                ? `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`
                : `M ${x1} ${y1} L ${x2} ${y2}`;
            const reversePath = curved
                ? `M ${x2} ${y2} Q ${midX} ${midY} ${x1} ${y1}`
                : `M ${x2} ${y2} L ${x1} ${y1}`;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="6" fill={color}>
                        <animateMotion 
                            dur="2.5s" 
                            repeatCount="indefinite" 
                            begin={delay + "s"} 
                            path={reverse ? reversePath : pathD} 
                        />
                    </circle>
                    <circle r="4" fill={color} opacity="0.4">
                        <animateMotion 
                            dur="2.5s" 
                            repeatCount="indefinite" 
                            begin={(delay + 0.5) + "s"} 
                            path={reverse ? reversePath : pathD} 
                        />
                    </circle>
                </g>
            );
        }

        // Card node component with colored top bar
        function ArchNode({ x, y, w, h, title, subtitle, icon, color, status = "online", small = false }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 64 : 78;
            const iconSize = small ? 20 : 28;
            const statusColors = { online: "#10B981", busy: "#F59E0B", offline: "#EF4444" };
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={8} rx={4} fill={color} />
                    <circle cx={x + w/2} cy={y + 32} r={small ? 18 : 24} fill={color + "20"} />
                    <text x={x + w/2} y={y + 37} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 11 : 13} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 9 : 10}>{subtitle}</text>}
                    <circle cx={x + w - 12} cy={y + 16} r="5" fill={statusColors[status]}>
                        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                </g>
            );
        }

                </svg>

        function SpecialistAgents() {
            const agents = [

                { name: "CodeGen", icon: "💻", color: "#3B82F6", desc: "Write code", status: "busy" },

                { name: "Reviewer", icon: "✅", color: "#F59E0B", desc: "Code review", status: "online" },
                { name: "Architect", icon: "🏗️", color: "#EC4899", desc: "System design", status: "online" },

        function App() {

            const tabs = [
                { id: "topology", label: "🌐 Hub/Worker Topology", component: HubWorkerTopology },
                { id: "tasks", label: "📋 Task Distribution", component: TaskDistribution },
                { id: "agents", label: "🤖 Specialist Agents", component: SpecialistAgents }
            ];
            
            const ActiveDiagram = tabs.find(t => t.id === activeTab)?.component || HubWorkerTopology;
            const activeTabData = tabs.find(t => t.id === activeTab);
            
            return (
                <div className="container">
                    <div className="section-tabs">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={"tab-btn " + (activeTab === tab.id ? "active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>{activeTabData?.label}</h2>
                            <p>Live swarm visualization with animated task flow</p>
                        </div>
                        <div className="diagram-svg">
                            <ActiveDiagram />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
