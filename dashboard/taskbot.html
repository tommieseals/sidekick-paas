<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBot - Enterprise Automation Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .nav-brand h1 { font-size: 1.5rem; }
        .nav-links { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .nav-link { 
            color: rgba(255,255,255,0.8); 
            text-decoration: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            transition: all 0.3s; 
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); color: white; }
        .btn-external {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-external:hover { background: #059669; }
        
        .iframe-container {
            width: 100%;
            height: calc(100vh - 70px);
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .fallback {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .fallback h2 { margin-bottom: 20px; }
        .fallback p { margin-bottom: 30px; opacity: 0.8; }
        
        @media (max-width: 768px) {
            .nav-links { gap: 10px; }
            .nav-link { padding: 6px 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand"><h1>📋 TaskBot</h1></div>
        <div class="nav-links">
            <a href="/" class="nav-link">← Dashboard</a>
            <a href="/infrastructure.html" class="nav-link">Infrastructure</a>
            <a href="/projects.html" class="nav-link">Projects</a>
            <a href="https://included-link-heard-remembered.trycloudflare.com/taskbot-power-automate/#/" target="_blank" class="btn-external">
                Open Full Site ↗
            </a>
        </div>
    </nav>
    
    <div class="iframe-container">
        <iframe 
            src="https://included-link-heard-remembered.trycloudflare.com/taskbot-power-automate/#/" 
            title="TaskBot Enterprise Automation Platform"
            allow="fullscreen"
            id="taskbot-frame"
            onload="document.getElementById('fallback').style.display='none';"
            onerror="showFallback();">
        </iframe>
    </div>
    
    <div class="fallback" id="fallback">
        <h2>🔗 TaskBot - Enterprise Automation Platform</h2>
        <p>The embedded view couldn't load. Click the button below to open TaskBot in a new tab.</p>
        <a href="https://included-link-heard-remembered.trycloudflare.com/taskbot-power-automate/#/" target="_blank" class="btn-external">
            Open TaskBot ↗
        </a>
    </div>
    
    <script>
        function showFallback() {
            document.getElementById('fallback').style.display = 'block';
            document.querySelector('.iframe-container').style.display = 'none';
        }
        
        // Check if iframe loaded after 5 seconds
        setTimeout(() => {
            try {
                const frame = document.getElementById('taskbot-frame');
                if (!frame.contentWindow.document) {
                    showFallback();
                }
            } catch(e) {
                // Cross-origin - that's fine, it loaded
            }
        }, 5000);
    </script>
</body>
</html>
