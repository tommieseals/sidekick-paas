        // Animated flowing particle line component
        function FlowingLine({ x1, y1, x2, y2, color = "#00d9ff", delay = 0, curved = false, bidirectional = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 50 : (y1 + y2) / 2;
            const pathD = curved 
                ? `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`
                : `M ${x1} ${y1} L ${x2} ${y2}`;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="8,4" />
                    <circle r="6" fill={color} filter="url(#glow)">
                        <animateMotion dur="2s" repeatCount="indefinite" begin={delay + "s"} path={pathD} />
                    </circle>
                    {bidirectional && (
                        <circle r="5" fill={color} opacity="0.7">
                            <animateMotion dur="2s" repeatCount="indefinite" begin={(delay + 1) + "s"} path={pathD} keyPoints="1;0" keyTimes="0;1" />
                        </circle>
                    )}
                    <circle cx={x1} cy={y1} r="4" fill={color} opacity="0.6" />
                    <circle cx={x2} cy={y2} r="4" fill={color} opacity="0.6" />
                </g>
            );
        }

        // Card node component with colored top bar
        function ArchNode({ x, y, w, h, title, subtitle, icon, color, small = false, glow = false }) {
            const titleY = small ? 50 : 60;
            const subtitleY = small ? 66 : 80;
            const iconSize = small ? 22 : 30;
            
            return (
                <g>
                    {glow && <rect x={x-2} y={y-2} width={w+4} height={h+4} rx={14} fill="none" stroke={color} strokeWidth="2" opacity="0.4" />}
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="#1a1a2e" stroke={color + "60"} strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={8} rx={4} fill={color} />
                    <circle cx={x + w/2} cy={y + 32} r={small ? 18 : 24} fill={color + "25"} stroke={color + "40"} strokeWidth="1" />
                    <text x={x + w/2} y={y + 38} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#fff" fontSize={small ? 11 : 13} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#a0aec0" fontSize={small ? 9 : 10}>{subtitle}</text>}
                </g>
            );
        }

            const ActiveDiagram = tabs.find(t => t.id === activeTab)?.component || KnowledgeHub;
            const activeDesc = tabs.find(t => t.id === activeTab)?.desc || "";
            
            return (

                    <div className="diagram-card">

                    <div className="status-grid">

                            <p>Main + 2 Sub + Admin</p>

                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
