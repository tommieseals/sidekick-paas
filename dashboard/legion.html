<body>
    <nav class="nav-bar">
        <div class="nav-brand"><h1>🏴 Legion - Job Search Army</h1></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Animated flowing particle line
        function FlowingLine({ x1, y1, x2, y2, color = "#e94560", delay = 0, curved = false, reverse = false }) {
            const midX = (x1 + x2) / 2;
            const midY = curved ? Math.min(y1, y2) - 40 : (y1 + y2) / 2;
            const pathD = curved 
                ? `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`
                : `M ${x1} ${y1} L ${x2} ${y2}`;
            const reversePath = curved
                ? `M ${x2} ${y2} Q ${midX} ${midY} ${x1} ${y1}`
                : `M ${x2} ${y2} L ${x1} ${y1}`;

            return (
                <g>
                    <path d={pathD} fill="none" stroke={color + "40"} strokeWidth="2" strokeDasharray="6,4" />
                    <circle r="5" fill={color}>
                        <animateMotion dur="2.5s" repeatCount="indefinite" begin={delay + "s"} path={reverse ? reversePath : pathD} />
                    </circle>
                    <circle cx={x1} cy={y1} r="4" fill={color} opacity="0.6" />
                    <circle cx={x2} cy={y2} r="4" fill={color} opacity="0.6" />
                </g>
            );
        }

        // Card node with colored top bar
        function ArchNode({ x, y, w, h, title, subtitle, icon, color, small = false, status = null }) {
            const titleY = small ? 48 : 58;
            const subtitleY = small ? 62 : 76;
            const iconSize = small ? 20 : 28;
            
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={12} fill="white" stroke="#E2E8F0" strokeWidth="1" filter="url(#shadow)" />
                    <rect x={x} y={y} width={w} height={6} rx={3} fill={color} />
                    <circle cx={x + w/2} cy={y + 28} r={small ? 18 : 24} fill={color + "20"} />
                    <text x={x + w/2} y={y + 33} textAnchor="middle" fontSize={iconSize} dominantBaseline="middle">{icon}</text>
                    <text x={x + w/2} y={y + titleY} textAnchor="middle" fill="#1A202C" fontSize={small ? 11 : 13} fontWeight="600">{title}</text>
                    {subtitle && <text x={x + w/2} y={y + subtitleY} textAnchor="middle" fill="#718096" fontSize={small ? 9 : 10}>{subtitle}</text>}
                    {status && (
                        <g>
                            <circle cx={x + w - 12} cy={y + 12} r={6} fill={status === 'active' ? '#48BB78' : status === 'pending' ? '#ECC94B' : '#E53E3E'} />
                            <circle cx={x + w - 12} cy={y + 12} r={6} fill={status === 'active' ? '#48BB78' : 'none'}>
                                <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite" />
                                <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
                            </circle>
                        </g>
                    )}
                </g>
            );
        }

        // Queue visualization
        function QueueBlock({ x, y, w, h, label, count, color }) {
            return (
                <g>
                    <rect x={x} y={y} width={w} height={h} rx={6} fill={color + "20"} stroke={color} strokeWidth="2" />
                    <text x={x + w/2} y={y + h/2 - 6} textAnchor="middle" fill={color} fontSize="10" fontWeight="600">{label}</text>
                    <text x={x + w/2} y={y + h/2 + 10} textAnchor="middle" fill="#1A202C" fontSize="14" fontWeight="bold">{count}</text>
                </g>
            );
        }

        // 8 Departments View
        function DepartmentsView() {
            const departments = [
                { id: 1, name: "Headhunting", icon: "🎯", color: "#e94560", desc: "Find Jobs", status: "active" },
                { id: 2, name: "Research", icon: "🔍", color: "#3182CE", desc: "Company Intel", status: "active" },
                { id: 3, name: "Resume", icon: "📄", color: "#38B2AC", desc: "Tailoring", status: "active" },
                { id: 4, name: "Cover Letter", icon: "✉️", color: "#9F7AEA", desc: "Generation", status: "active" },
                { id: 5, name: "Submission", icon: "📤", color: "#48BB78", desc: "Apply Jobs", status: "pending" },
                { id: 6, name: "Tracking", icon: "📊", color: "#ED8936", desc: "Monitor Apps", status: "active" },
                { id: 7, name: "Follow-up", icon: "📞", color: "#667EEA", desc: "Outreach", status: "pending" },
                { id: 8, name: "Interview", icon: "🎤", color: "#D69E2E", desc: "Prep & Coach", status: "pending" }
            ];

            return (
                <svg viewBox="0 0 1100 650" style={{width: "100%", minWidth: 800, height: "auto"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.1" />
                        </filter>
                    </defs>

                    {/* Central Hub */}
                    <ArchNode x={450} y={250} w={200} h={120} title="Legion Hub" subtitle="Orchestrator • Dispatcher" icon="🏴" color="#e94560" status="active" />
                    
                    {/* Department nodes in circular layout */}
                    {departments.map((dept, i) => {
                        const angle = (i * 45 - 90) * (Math.PI / 180);
                        const radius = 220;
                        const cx = 550 + radius * Math.cos(angle);
                        const cy = 310 + radius * Math.sin(angle);
                        return (
                            <g key={dept.id}>
                                <ArchNode 
                                    x={cx - 70} y={cy - 45} w={140} h={90} 
                                    title={dept.name} subtitle={dept.desc} 
                                    icon={dept.icon} color={dept.color} 
                                    small={true} status={dept.status}
                                />
                                <FlowingLine 
                                    x1={550} y1={310} 
                                    x2={cx} y2={cy} 
                                    color={dept.color} 
                                    delay={i * 0.3}
                                />

                    {/* Legend */}

                    <text x={50} y={575} fill="#1A202C" fontSize="12" fontWeight="600">Status Legend</text>
                    <circle cx={60} cy={595} r={6} fill="#48BB78" />
                    <text x={75} y={599} fill="#718096" fontSize="10">Active</text>
                    <circle cx={130} cy={595} r={6} fill="#ECC94B" />
                    <text x={145} y={599} fill="#718096" fontSize="10">Pending</text>
                    <circle cx={210} cy={595} r={6} fill="#E53E3E" />
                    <text x={225} y={599} fill="#718096" fontSize="10">Offline</text>
                    <text x={50} y={620} fill="#718096" fontSize="9">8 departments • Autonomous workers</text>
                </svg>
            );
        }

        // Job Pipeline Cascade

                    <text x={330} y={475} fill="#48BB78" fontSize="11" fontWeight="600">1 pending</text>

                    <text x={800} y={420} textAnchor="middle" fill="#1A202C" fontSize="14" fontWeight="600">⚙️ Worker Status</text>
                    
                    <circle cx={590} cy={455} r={6} fill="#48BB78" />
                    <text x={605} y={459} fill="#718096" fontSize="10">headhunter-1: scanning LinkedIn</text>
                    
                    <circle cx={590} cy={480} r={6} fill="#48BB78" />
                    <text x={605} y={484} fill="#718096" fontSize="10">researcher-1: analyzing company</text>
                    
                    <circle cx={590} cy={505} r={6} fill="#ECC94B" />
                    <text x={605} y={509} fill="#718096" fontSize="10">submitter-1: rate limited (retry 2m)</text>
                    
                    <circle cx={830} cy={455} r={6} fill="#48BB78" />
                    <text x={845} y={459} fill="#718096" fontSize="10">resume-gen-1: tailoring</text>
                    
                    <circle cx={830} cy={480} r={6} fill="#48BB78" />
                    <text x={845} y={484} fill="#718096" fontSize="10">tracker-1: checking statuses</text>
                    
                    <circle cx={830} cy={505} r={6} fill="#E53E3E" />
                    <text x={845} y={509} fill="#718096" fontSize="10">coverletter-2: offline</text>
                </svg>
            );
        }

        // Hub Worker Cascade
        function CascadeView() {
            return (
                <svg viewBox="0 0 1100 620" style={{width: "100%", minWidth: 800, height: "auto"}}>
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" floodOpacity="0.1" />
                        </filter>
                    </defs>

                    {/* Main Hub */}
                    <ArchNode x={450} y={30} w={200} h={100} title="Legion Hub" subtitle="Central Command" icon="🏴" color="#e94560" status="active" />

                    {/* Lines from Workers to Services */}
                    <FlowingLine x1={170} y1={405} x2={180} y2={510} color="#0077B5" delay={2.0} />
                    <FlowingLine x1={280} y1={405} x2={320} y2={510} color="#2557a7" delay={2.1} />
                    <FlowingLine x1={390} y1={405} x2={460} y2={510} color="#0CAA41" delay={2.2} />

            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState("departments");
            const [stats, setStats] = useState({
                jobsFound: 247,
                applied: 156,
                interviews: 4,
                offers: 1
            });
            
            const tabs = [
                { id: "departments", label: "🏢 8 Departments", component: DepartmentsView },
                { id: "pipeline", label: "📊 Job Pipeline", component: PipelineView },
                { id: "cascade", label: "⚡ Hub → Workers", component: CascadeView }
            ];
            
            const ActiveDiagram = tabs.find(t => t.id === activeTab)?.component || DepartmentsView;
            
            return (
                <div className="container">
                    <div className="stats-row">
                        <div className="stat-card">
                            <h3>🎯 {stats.jobsFound}</h3>
                            <p>Jobs Found</p>
                        </div>
                        <div className="stat-card">
                            <h3>📤 {stats.applied}</h3>
                            <p>Applications</p>
                        </div>
                        <div className="stat-card">
                            <h3>🎤 {stats.interviews}</h3>
                            <p>Interviews</p>
                        </div>
                        <div className="stat-card">
                            <h3>🎉 {stats.offers}</h3>
                            <p>Offers</p>
                        </div>
                    </div>

                    <div className="section-tabs">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={"tab-btn " + (activeTab === tab.id ? "active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="diagram-card">
                        <div className="diagram-title">
                            <h2>{tabs.find(t => t.id === activeTab)?.label}</h2>
                            <p>Legion Job Search Army - Autonomous job hunting system</p>
                        </div>
                        <div className="diagram-svg">
                            <ActiveDiagram />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
